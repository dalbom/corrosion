domain: corrosion
method: dit
experiment: s11_s21
study:
  name: corrosion_default_verification
variant:
  sensor_set: s11_s21
seed: 1
run:
  root: runs
dataset:
  train_csv: datasets/corrosion/splits/train.csv
  val_csv: datasets/corrosion/splits/val.csv
  test_csv: datasets/corrosion/splits/test.csv
  img_root: datasets/corrosion
  image_subdir: images
  image_size: 128
  channels: [S11, S21]
training:
  num_steps: 1000000
  batch_size: 8
  num_workers: 4
  lr: 0.0001
loss:
  denoising_weight: 1.0
  lambda_l1: 100.0
  lambda_ssim: 50.0
  lambda_perceptual: 10.0
conditioning:
  norm_type: batchnorm
architecture:
  image_size: 128
  timesteps: 1000
  sampling_timesteps: 250
  objective: pred_noise
  patch_size: 4
  hidden_size: 384
  depth: 12
  num_heads: 6
